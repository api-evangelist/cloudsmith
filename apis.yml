    name: Cloudsmith API (v1)
    tags:
      - REST
      - Packages
      - Repositories
      - Entitlements
      - Webhooks
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.cloudsmith.io
    humanURL: https://docs.cloudsmith.com/api
    properties:
      - url: https://docs.cloudsmith.com/api
        type: Documentation
      - url: https://api.cloudsmith.io/?format=openapi
        type: OpenAPI
      - url: openapi/cloudsmith-openapi.json
        type: OpenAPI
      - url: https://help.cloudsmith.io/reference/getting-started-with-the-api
        type: Getting Started
    description: >-
      The Cloudsmith REST API (v1) covers 217+ endpoints across 22 tag
      groups including repos, orgs, packages, entitlements, files, user,
      webhooks, quota, vulnerabilities, metrics, audit-log, distros,
      formats, namespaces, recycle-bin, storage-regions, badges,
      broadcasts, bulk-action, rates, status. Default page size is 30
      items, max 500. Authentication is via personal or service-account
      API key in the Authorization header.
