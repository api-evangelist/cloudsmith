aid: cloudsmith
name: Cloudsmith
description: >-
  Cloudsmith is a cloud-native, universal package management platform
  providing fully managed, geo-replicated artifact repositories for over 30
  package formats (Docker, npm, Maven, NuGet, PyPI, RubyGems, RPM, Deb, Helm,
  Cargo, Go, Composer, Conan, Conda, Vagrant, Raw, and more). The Cloudsmith
  REST API (v1) at api.cloudsmith.io exposes operations for organizations,
  repositories, packages, files, entitlements, vulnerabilities, webhooks,
  audit logs, metrics, quotas, deny policies, namespaces, distros, formats,
  recycle bin, storage regions, and broadcasts. Authentication is via API
  key passed in the Authorization header as "token YOUR_API_KEY".
type: Index
