naftiko: 1.0.0-alpha2
info:
  label: Cloudsmith API (v1) — distros
  description: 'Cloudsmith API (v1) — distros. 2 operations. Lead operation: Get a list of all supported distributions.. Self-contained
    Naftiko capability covering one Cloudsmith business surface.'
  tags:
  - Cloudsmith
  - distros
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDSMITH_API_KEY: CLOUDSMITH_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloudsmith-distros
    baseUri: https://api.cloudsmith.io
    description: Cloudsmith API (v1) — distros business capability. Self-contained, no shared references.
    resources:
    - name: distros
      path: /distros/
      operations:
      - name: distroslist
        method: GET
        description: Get a list of all supported distributions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: distros-slug
      path: /distros/{slug}/
      operations:
      - name: distrosread
        method: GET
        description: View for viewing/listing distributions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: cloudsmith-distros-rest
    port: 8080
    description: REST adapter for Cloudsmith API (v1) — distros. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/distros
      name: distros
      description: REST surface for distros.
      operations:
      - method: GET
        name: distroslist
        description: Get a list of all supported distributions.
        call: cloudsmith-distros.distroslist
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/distros/{slug}
      name: distros-slug
      description: REST surface for distros-slug.
      operations:
      - method: GET
        name: distrosread
        description: View for viewing/listing distributions.
        call: cloudsmith-distros.distrosread
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloudsmith-distros-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cloudsmith API (v1) — distros. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-list-all-supported-distributions
      description: Get a list of all supported distributions.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloudsmith-distros.distroslist
      outputParameters:
      - type: object
        mapping: $.
    - name: view-viewing-listing-distributions
      description: View for viewing/listing distributions.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloudsmith-distros.distrosread
      outputParameters:
      - type: object
        mapping: $.
