naftiko: 1.0.0-alpha2
info:
  label: Cloudsmith API (v1) — broadcasts
  description: 'Cloudsmith API (v1) — broadcasts. 1 operations. Lead operation: Create a broadcast token.. Self-contained
    Naftiko capability covering one Cloudsmith business surface.'
  tags:
  - Cloudsmith
  - broadcasts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDSMITH_API_KEY: CLOUDSMITH_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloudsmith-broadcasts
    baseUri: https://api.cloudsmith.io
    description: Cloudsmith API (v1) — broadcasts business capability. Self-contained, no shared references.
    resources:
    - name: broadcasts-org-broadcast-token
      path: /broadcasts/{org}/broadcast-token/
      operations:
      - name: broadcastscreatebroadcasttoken
        method: POST
        description: Create a broadcast token.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: data
          in: body
          type: string
  exposes:
  - type: rest
    namespace: cloudsmith-broadcasts-rest
    port: 8080
    description: REST adapter for Cloudsmith API (v1) — broadcasts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/broadcasts/{org}/broadcast-token
      name: broadcasts-org-broadcast-token
      description: REST surface for broadcasts-org-broadcast-token.
      operations:
      - method: POST
        name: broadcastscreatebroadcasttoken
        description: Create a broadcast token.
        call: cloudsmith-broadcasts.broadcastscreatebroadcasttoken
        with:
          data: rest.data
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloudsmith-broadcasts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cloudsmith API (v1) — broadcasts. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-broadcast-token
      description: Create a broadcast token.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloudsmith-broadcasts.broadcastscreatebroadcasttoken
      with:
        data: tools.data
      outputParameters:
      - type: object
        mapping: $.
