  - type: mcp
    namespace: cloudsmith-repos-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cloudsmith API (v1) — repos. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-list-all-repositories-associated
      description: Get a list of all repositories associated with current user.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloudsmith-repos.reposuserlist
      with:
        page: tools.page
        page_size: tools.page_size
      outputParameters:
      - type: object
        mapping: $.
    - name: get-list-all-repositories-within
      description: Get a list of all repositories within a namespace.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloudsmith-repos.reposnamespacelist
      with:
        page: tools.page
        page_size: tools.page_size
        query: tools.query
        sort: tools.sort
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-repository-given-namespace
      description: Create a new repository in a given namespace.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloudsmith-repos.reposcreate
      with:
        data: tools.data
      outputParameters:
      - type: object
        mapping: $.
    - name: get-specific-repository
      description: Get a specific repository.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloudsmith-repos.reposread
      outputParameters:
      - type: object
        mapping: $.
    - name: update-details-about-repository-given
      description: Update details about a repository in a given namespace.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: cloudsmith-repos.repospartialupdate
      with:
        data: tools.data
      outputParameters:
